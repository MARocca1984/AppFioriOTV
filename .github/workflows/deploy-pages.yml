name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build UI5 app
        run: npx ui5 build

      # The build references the UI5 runtime under "resources/", which is not part of
      # the app output. For static hosting we point the bootstrap to the public OpenUI5
      # CDN (the source index.html stays untouched, so local "npm start" keeps working).
      - name: Point bootstrap to OpenUI5 CDN
        run: |
          sed -i 's#src="resources/sap-ui-core.js"#src="https://sdk.openui5.org/1.120.0/resources/sap-ui-core.js"#' dist/index.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
